<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Services & Portfolio</title>
</head>
<body>

    <section class="services-section">
        <h2 class="section-title">OUR SERVICES</h2>
       
        <div class="card">
            <h2 style="color: var(--primary);">Our Core Services</h2>
            <div class="services-grid">
                <div class="service-box"><i class="fas fa-fire-extinguisher"></i><h4>Fire Fighting Equipment</h4></div>
                <div class="service-box"><i class="fas fa-bell"></i><h4>Fire Alarm Systems</h4></div>
                <div class="service-box"><i class="fas fa-user-shield"></i><h4>Safety Gears (PPE'S)</h4></div>
                <div class="service-box"><i class="fas fa-bolt"></i><h4>Electric Fence Installation</h4></div>
                <div class="service-box"><i class="fas fa-camera"></i><h4>CCTV Camera Installation</h4></div>
                <div class="service-box"><i class="fas fa-map-marked-alt"></i><h4>GPS Tracking System</h4></div>
                <!-- Service mpya -->
                <div class="service-box"><i class="fas fa-snowflake"></i><h4>AC Installation & Services</h4></div>
            </div>
        </div>
    </section>

    <!-- Sehemu ya Portfolio / Showcase -->
    <section class="showcase-section">
        <h2 class="section-title">PROJECT SHOWCASE</h2>
        <div class="showcase-container" id="showcase">
            <!-- Picha/Video Boxes -->
            <div class="media-item"><img src="pictures/i8.jpeg" alt="Work 1"></div>
            <div class="media-item"><video muted autoplay src="pictures/v1.mp4" controls></video></div>
            <div class="media-item"><img src="pictures/i6.jpeg" alt="Work 2"></div>
            <div class="media-item"><video muted autoplay src="pictures/v2.mp4" controls></video></div>
            <div class="media-item"><img src="pictures/i11.jpeg" alt="Work 3"></div>
        </div>
    </section>

    <style>
        :root {
            --primary: #d32f2f;
            --dark: #1a1a1a;
            --white: #ffffff;
        }

        /* Showcase Styles */
        .showcase-section { padding: 50px 20px; background: #fff; }
        
        .showcase-container {
            display: flex;
            overflow-x: auto; /* Inaruhusu scrolling ya pembeni */
            gap: 20px;
            padding: 20px;
            scroll-behavior: smooth; /* Scrolling laini */
        }

        .media-item {
            min-width: 350px;
            height: 250px;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s;
            cursor: pointer;
        }

        .media-item:hover { transform: scale(1.05); }
        .media-item img, .media-item video { width: 100%; height: 100%; object-fit: cover; }

        /* General Styles */
        .services-section { padding: 50px 20px; background-color: #f3f3f3; text-align: center; font-family: 'Poppins', sans-serif; }
        .section-title { font-size: 2.5rem; color: #222; margin-bottom: 40px; text-transform: uppercase; border-bottom: 3px solid var(--primary); display: inline-block; padding-bottom: 10px; }
        .card { background: var(--white); padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .service-box { padding: 20px; border-radius: 15px; background: #fff5f5; transition: 0.3s; }
        .service-box:hover { background: var(--primary); color: white; transform: translateY(-5px); }
        .service-box i { font-size: 40px; margin-bottom: 15px; }
    </style>

    <script>
        // Smooth scroll effect on hover (Optional feature)
        const container = document.getElementById('showcase');
        
        // Hii inafanya showcase isogee kidogo kufuata mouse
        container.addEventListener('mousemove', (e) => {
            const { clientWidth, scrollLeft, scrollWidth } = container;
            if (e.clientX > clientWidth * 0.8) {
                container.scrollLeft += 5;
            } else if (e.clientX < clientWidth * 0.2) {
                container.scrollLeft -= 5;
            }
        });
    </script>
</body>
</html>
