<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles/services.css">
    <title>Services & Portfolio</title>
</head>
<body>

    <section class="services-section">
        <h2 class="section-title">OUR SERVICES</h2>
       
        <div class="card">
            <h2 style="color: var(--primary);">Our Core Services</h2>
            <div class="services-grid">
                <div class="service-box"><i class="fas fa-fire-extinguisher"></i><h4>Fire Fighting Equipment</h4></div>
                <div class="service-box"><i class="fas fa-bell"></i><h4>Fire Alarm Systems</h4></div>
                <div class="service-box"><i class="fas fa-user-shield"></i><h4>Safety Gears (PPE'S)</h4></div>
                <div class="service-box"><i class="fas fa-bolt"></i><h4>Electric Fence Installation</h4></div>
                <div class="service-box"><i class="fas fa-camera"></i><h4>CCTV Camera Installation</h4></div>
                <div class="service-box"><i class="fas fa-map-marked-alt"></i><h4>GPS Tracking System</h4></div>
                <!-- Service mpya -->
                <div class="service-box"><i class="fas fa-snowflake"></i><h4>AC Installation & Services</h4></div>
            </div>
        </div>
    </section>

    <!-- Sehemu ya Portfolio / Showcase -->
    <section class="showcase-section">
        <h2 class="section-title">PROJECT SHOWCASE</h2>
        <div class="showcase-container" id="showcase">
            <!-- Picha/Video Boxes -->
            <div class="media-item"><img src="pictures/i8.jpeg" alt="Work 1"></div>
            <div class="media-item"><video muted autoplay src="pictures/v1.mp4" controls></video></div>
            <div class="media-item"><img src="pictures/i6.jpeg" alt="Work 2"></div>
            <div class="media-item"><video muted autoplay src="pictures/v2.mp4" controls></video></div>
            <div class="media-item"><img src="pictures/i11.jpeg" alt="Work 3"></div>
        </div>
    </section>



    <script>
        // Smooth scroll effect on hover (Optional feature)
        const container = document.getElementById('showcase');
        
        // Hii inafanya showcase isogee kidogo kufuata mouse
        container.addEventListener('mousemove', (e) => {
            const { clientWidth, scrollLeft, scrollWidth } = container;
            if (e.clientX > clientWidth * 0.8) {
                container.scrollLeft += 5;
            } else if (e.clientX < clientWidth * 0.2) {
                container.scrollLeft -= 5;
            }
        });
    </script>
</body>
</html>
