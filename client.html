<script>

   async function typeWriter(element) {
  const text = element.getAttribute('data-text');
  for (let i = 0; i < text.length; i++) {
    element.innerHTML += text.charAt(i);
    await new Promise(resolve => setTimeout(resolve, 80)); // Kasi ya herufi
  }
}

async function runTypingEffect() {
  const elements = document.querySelectorAll('.typing');
  for (const el of elements) {
    await typeWriter(el); // Inasubiri kila laini imalize kabla ya kwenda chini
  }
}

// Inafanya kazi ukurasa unapofunguka
runTypingEffect();

    const clients = [
  "Pivotech Company Limited",
  "Radiant Industries Limited",
  "Prime Care Distillers",
  "Helios Tower",
  "Msasani Towers (MMDT)"
];

const displayElement = document.getElementById('client-display');

function showClients() {
  let i = 0;
  function nextClient() {
    if (i < clients.length) {
      displayElement.innerHTML = clients[i]; // Inaonyesha client mmoja
      displayElement.style.opacity = 1; // Animation ya fade-in
      
      // Subiri sekunde 2 kisha badilisha
      setTimeout(() => {
        displayElement.style.opacity = 0;
        setTimeout(() => {
          i++;
          nextClient();
        }, 500); // Muda wa kufifia
      }, 2000);
    }
  }
  nextClient();
}

showClients();
</script>
