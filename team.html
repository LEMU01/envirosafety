<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Management Team | AEP Enviro Safety</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
   <link rel="stylesheet" href="styles/team.css">
</head>
<body>

<div class="hero">
    <h1>Our Leadership Team</h1>
    <p>Innovation, Integrity, and Safety at the Core</p>
</div>

<div class="container">
    <div class="team-grid" id="team">
        <!-- Card 1 -->
        <div class="card reveal">
            <div class="img-box"><img src="pictures/NK.jpeg" alt="CEO"></div>
            <h3>Albert Mshobozi</h3>
            <p style="color: #ffcccc;">Founder & CEO</p>
        </div>
        <!-- Card 2 -->
        <div class="card reveal">
            <div class="img-box"><img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=500" alt="Ops"></div>
            <h3>Sarah Mwasota</h3>
            <p style="color: #ffcccc;">Operations Manager</p>
        </div>
        <!-- Card 3 -->
        <div class="card reveal">
            <div class="img-box"><img src="https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?w=500" alt="Finance"></div>
            <h3>John Bosco</h3>
            <p style="color: #ffcccc;">Finance Director</p>
        </div>
    </div>
</div>

<center><a href="about.html" class="btn-home">Back to About Us</a></center>

<script>
    // Scroll Animation Script
    window.addEventListener('scroll', () => {
        const reveals = document.querySelectorAll('.reveal');
        reveals.forEach(r => {
            if(r.getBoundingClientRect().top < window.innerHeight - 150) r.classList.add('active');
        });
    });
</script>
</body>
</html>
