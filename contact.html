<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact AEP Enviro Safety</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #e63946;
            --dark: #1d3557;
            --glass: rgba(255, 255, 255, 0.95);
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: radial-gradient(circle at top right, #f1faee, #a8dadc);
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .wrapper {
            background: var(--glass);
            width: 90%; max-width: 1000px;
            padding: 50px; border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            display: grid; grid-template-columns: 1fr 1fr; gap: 50px;
        }
        h2 { font-size: 2.5rem; color: var(--dark); margin-bottom: 20px; }
        .info-card { background: var(--dark); color: white; padding: 30px; border-radius: 20px; }
        .info-card i { font-size: 25px; margin-right: 15px; color: var(--primary); }
        .form-group { margin-bottom: 20px; }
        input, textarea {
            width: 100%; padding: 15px; border: 2px solid #eee;
            border-radius: 12px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); }
        button {
            background: var(--primary); color: white; border: none;
            padding: 15px 40px; border-radius: 12px; font-weight: 600;
            cursor: pointer; transition: 0.4s; width: 100%;
        }
        button:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(230, 57, 70, 0.3); }
        
        @media (max-width: 768px) { .wrapper { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- Sehemu ya Kushoto -->
    <div class="info-content">
        <h2>Let's Secure Your Future</h2>
        <p>Tunapatikana Dar es Salaam, tayari kukuhudumia kwa viwango vya kimataifa.</p>
        <div class="info-card">
            <div style="margin-bottom: 20px;"><i class="fas fa-phone-alt"></i> +255 7XX XXX XXX</div>
            <div style="margin-bottom: 20px;"><i class="fas fa-envelope"></i> info@aepenvirosafety.co.tz</div>
            <div><i class="fas fa-map-marker-alt"></i> Makao Makuu, Dar es Salaam</div>
        </div>
    </div>

    <!-- Sehemu ya Fomu -->
    <form>
        <div class="form-group"><input type="text" placeholder="Full Name" required></div>
        <div class="form-group"><input type="email" placeholder="Email Address" required></div>
        <div class="form-group"><textarea rows="4" placeholder="How can we help?"></textarea></div>
        <button type="submit">Send Message <i class="fas fa-paper-plane"></i></button>
        <a href="about.html" style="display:block; margin-top:15px; text-align:center; color:var(--dark);">Back to About Us</a>
    </form>
</div>

</body>
</html>
